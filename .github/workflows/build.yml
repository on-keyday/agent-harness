name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write  # needed for the release job to publish on tag push

jobs:
  build:
    name: build ${{ matrix.target.os }}/${{ matrix.target.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: linux,   arch: amd64, archive: tar.gz }
          - { os: linux,   arch: arm64, archive: tar.gz }
          - { os: windows, arch: amd64, archive: zip    }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # make release = make build with -trimpath -ldflags="-s -w" applied to
      # every cmd/. Honors GOOS / GOARCH / GOEXE in the env (Makefile uses
      # `go env GOEXE` so cross-compile to windows automatically appends .exe).
      # cmd/harness-server's //go:embed of webui/static/main.wasm is handled by
      # the webui-build dependency in the build target.
      - name: make release
        env:
          GOOS: ${{ matrix.target.os }}
          GOARCH: ${{ matrix.target.arch }}
          CGO_ENABLED: "0"
        run: make release

      - name: stage release artifacts
        run: |
          set -euxo pipefail
          mkdir -p dist/bin dist/webui/static
          cp bin/* dist/bin/
          cp webui/static/main.wasm dist/webui/static/
          cp webui/static/wasm_exec.js dist/webui/static/
          cp README.md dist/ 2>/dev/null || true

      - name: pack archive
        env:
          ARCHIVE: ${{ matrix.target.archive }}
        run: |
          set -euxo pipefail
          NAME="agent-harness-${{ matrix.target.os }}-${{ matrix.target.arch }}"
          cd dist
          if [ "$ARCHIVE" = "zip" ]; then
            zip -r "../${NAME}.zip" .
          else
            tar -czf "../${NAME}.tar.gz" .
          fi
          cd ..
          ls -lh "${NAME}".*

      - name: upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-harness-${{ matrix.target.os }}-${{ matrix.target.arch }}
          path: agent-harness-${{ matrix.target.os }}-${{ matrix.target.arch }}.*
          if-no-files-found: error
          retention-days: 30

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: list artifacts
        run: ls -lh dist/

      - name: create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
